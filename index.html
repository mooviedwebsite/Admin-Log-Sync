    // ── Moovied Clean URL system ──────────────────────────────────────────────
    // Loads slug-map.json synchronously (XHR) before React mounts so the map
    // is ALWAYS ready. New IDs are already slug-style (mov_oppenheimer_2023)
    // so this just swaps underscores→dashes for the address bar display.
    // Also supports legacy UUID ids via the byId/bySlug maps.
    (function () {
      try {
        var BASE = '/Admin-Log-Sync';
        var onGHPages = location.pathname.indexOf(BASE) === 0
                     || location.hostname.indexOf('github.io') !== -1;
        if (!onGHPages) return;

        if (window.__MOOVIED_SLUGS__ &&
            Object.keys(window.__MOOVIED_SLUGS__.byId || {}).length > 0) return;

        window.__MOOVIED_SLUGS__ = { byId: {}, bySlug: {} };
        var M = window.__MOOVIED_SLUGS__;

        function applyEntry(id, slug) {
          if (!id || !slug) return;
          M.byId[id]     = slug;
          M.bySlug[slug] = id;
        }

        // ── For new slug-style IDs (mov_xxx_yyyy / tv_xxx_yyyy) ──────────────
        // Derive a display slug directly from the id — no map lookup needed.
        // mov_oppenheimer_2023 → oppenheimer-2023
        // tv_breaking_bad_2008 → breaking-bad-2008
        function idToDisplaySlug(id) {
          if (!id) return null;
          var s = String(id);
          if (/^(mov|tv)_/.test(s)) {
            return s.replace(/^(mov|tv)_/, '').replace(/_/g, '-');
          }
          return null; // legacy UUID — use map
        }

        // ── Load slug-map.json synchronously before React boots ───────────────
        // XHR sync = blocks parser for ~1 network RTT but guarantees map is
        // populated before a single line of React runs. File is tiny (<1 KB).
        try {
          var CACHE_KEY = 'mvd_slugs_v3';
          var CACHE_TTL = 5 * 60 * 1000;
          var cached = null;
          try {
            var raw = sessionStorage.getItem(CACHE_KEY);
            if (raw) {
              var obj = JSON.parse(raw);
              if (Date.now() - obj.t < CACHE_TTL) cached = obj.d;
            }
          } catch(e) {}

          if (cached && cached.length) {
            cached.forEach(function(e) { applyEntry(e.id, e.slug); });
          } else {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', BASE + '/slug-map.json', false); // false = synchronous
            xhr.send();
            if (xhr.status === 200) {
              var entries = JSON.parse(xhr.responseText);
              entries.forEach(function(e) { applyEntry(e.id, e.slug); });
              try {
                sessionStorage.setItem(CACHE_KEY, JSON.stringify({ t: Date.now(), d: entries }));
              } catch(e) {}
            }
          }
        } catch(ex) {}

        // ── URL helpers ───────────────────────────────────────────────────────
        var MOVIE_RE = /^(\/Admin-Log-Sync\/movie\/)([^/?#]+)(.*)?$/;

        // Convert any internal ID (UUID or slug-style) → display slug for address bar
        function toDisplay(p) {
          var m = MOVIE_RE.exec(p);
          if (!m) return null;
          var seg = m[2];
          // Already a display slug? (contains dashes, no mov_/tv_ prefix)
          if (M.bySlug[seg]) return null; // already display form, no change needed
          // New-style id: mov_xxx → xxx-yyy
          var derived = idToDisplaySlug(seg);
          if (derived && derived !== seg) return m[1] + derived + (m[3] || '');
          // Legacy UUID → look up in map
          var mapped = M.byId[seg];
          if (mapped && mapped !== seg) return m[1] + mapped + (m[3] || '');
          return null;
        }

        // Convert display slug → internal ID for React router
        function toInternal(p) {
          var m = MOVIE_RE.exec(p);
          if (!m) return null;
          var seg = m[2];
          // If it's already an internal id (mov_/tv_ prefix or UUID), no change
          if (/^(mov|tv)_/.test(seg)) return null;
          if (/^[0-9a-f]{8}-/.test(seg)) return null;
          // It's a display slug — convert back to internal id
          // First check map (legacy UUIDs)
          var mapped = M.bySlug[seg];
          if (mapped) return m[1] + mapped + (m[3] || '');
          // New-style: dashes→underscores with prefix guess
          // We can't know prefix without the map, so check both
          var tryMov = 'mov_' + seg.replace(/-/g, '_');
          var tryTv  = 'tv_'  + seg.replace(/-/g, '_');
          if (M.byId[tryMov] || M.bySlug[seg] !== undefined) return m[1] + tryMov + (m[3] || '');
          if (M.byId[tryTv])  return m[1] + tryTv  + (m[3] || '');
          // Last resort: search byId values
          var found = null;
          Object.keys(M.byId).forEach(function(id) {
            if (M.byId[id] === seg) found = id;
          });
          return found ? m[1] + found + (m[3] || '') : null;
        }

        function cosmeticSwapToSlug() {
          var display = toDisplay(location.pathname);
          if (display) {
            history.replaceState(history.state, '',
              display + location.search + location.hash);
          }
        }

        // ── Initial synchronous URL fix ───────────────────────────────────────
        // If user lands on a display-slug URL, convert to internal before React mounts
        (function() {
          var internal = toInternal(location.pathname);
          if (internal) history.replaceState(history.state, '',
            internal + location.search + location.hash);
        })();

        // Cosmetic swap right now (if we landed on an internal id URL)
        cosmeticSwapToSlug();

        // ── Hook navigation for SPA page changes ─────────────────────────────
        var _ps = history.pushState.bind(history);
        var _rs = history.replaceState.bind(history);

        history.pushState = function(s, t, u) {
          // React pushes internal IDs → let it, then cosmetically swap
          var r = _ps(s, t, u);
          setTimeout(cosmeticSwapToSlug, 0);
          return r;
        };
        history.replaceState = function(s, t, u) {
          // Intercept only if this is a display-slug being set (e.g. user typed URL)
          if (typeof u === 'string') {
            var internal = toInternal(u);
            if (internal) { u = internal; }
          }
          return _rs(s, t, u);
        };
        window.addEventListener('popstate', function() {
          var internal = toInternal(location.pathname);
          if (internal) _rs(history.state, '',
            internal + location.search + location.hash);
          setTimeout(cosmeticSwapToSlug, 0);
        });

        // Also refresh async in background to pick up any new movies
        setTimeout(function() {
          try {
            fetch(BASE + '/slug-map.json?_=' + Date.now())
              .then(function(r) { return r.ok ? r.json() : []; })
              .then(function(entries) {
                if (!entries || !entries.length) return;
                entries.forEach(function(e) { applyEntry(e.id, e.slug); });
                cosmeticSwapToSlug();
                try {
                  sessionStorage.setItem('mvd_slugs_v3',
                    JSON.stringify({ t: Date.now(), d: entries }));
                } catch(e) {}
              });
          } catch(ex) {}
        }, 500);

      } catch(e) { /* never break the page */ }
    })();

    <script>
    (function () {

      var DEAD = 'https://a16cbf22-021e-4fbd-a6d1-5c8d3c7e4244-00-923mtzjoxrcz.worf.replit.dev/api';

      /* 1. Set localStorage so ts() reads our server URL */
      try {

      /* 4. Cross-device user data sync.

            On change: push localStorage edits back to GAS (debounced).
            Storage keys used by the app:
              moovied_session         — current user
              moovied_bookmarks       — array of movie ids
              moovied_watch_history   — array of {movie_id, watched_at, progress}
              moovied_movie_likes     — array of liked movie ids

      try {
        var SESSION_KEY = 'moovied_session';
        var BOOKMARKS_KEY = 'moovied_bookmarks';
        var HISTORY_KEY = 'moovied_watch_history';
        var LIKES_KEY = 'moovied_movie_likes';

        function log() {
          try {
            var args = ['%c[Moovied Sync]', 'color:#22d3ee;font-weight:bold'];
            for (var i=0;i<arguments.length;i++) args.push(arguments[i]);
            console.log.apply(console, args);

        function gasPost(payload) {

            method: 'POST',
            mode: 'cors',
            redirect: 'follow',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          }).then(function(r){
            return r.text().then(function(t){
              try { var j = JSON.parse(t); log('POST ✓', payload.action, j); return j; }
              catch(e) { log('POST ✗ non-JSON response for', payload.action, 'status', r.status, t.slice(0,200)); return null; }
            });
          }).catch(function(err){ log('POST ✗ fetch error for', payload.action, err && err.message || err); return null; });
        }

        function gasGet(action, params) {
          var q = 'action=' + encodeURIComponent(action);
          if (params) Object.keys(params).forEach(function(k){
            q += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);

          log('GET →', action, params);
          return _f(GAS + '?' + q, { mode: 'cors', redirect: 'follow' }).then(function(r){
            return r.text().then(function(t){
              try { var j = JSON.parse(t); log('GET ✓', action, j); return j; }
              catch(e) { log('GET ✗ non-JSON for', action, 'status', r.status, t.slice(0,200)); return null; }
            });

        function getCurrentUser() {
          try {
            var raw = localStorage.getItem(SESSION_KEY);

            return JSON.parse(raw);

        function readJson(key) {
          try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch(e){ return []; }

        function mergeIdLists(local, remote) {
          var seen = {}, out = [];
          (remote || []).concat(local || []).forEach(function(id){
            var k = String(id);
            if (!seen[k]) { seen[k] = 1; out.push(k); }
          });
          return out;
        }

        function mergeHistory(local, remote) {
          var byId = {};
          (remote || []).forEach(function(it){
            if (!it) return;
            var mid = it.movie_id || it.movieId || it.id;
            if (!mid) return;
            byId[mid] = { movie_id: String(mid), watched_at: it.watched_at || '', progress: Number(it.progress)||0 };
          });
          (local || []).forEach(function(it){
            if (!it) return;
            var mid = (typeof it === 'string') ? it : (it.movie_id || it.movieId || it.id);
            if (!mid) return;
            var when = (typeof it === 'string') ? new Date().toISOString() : (it.watched_at || it.watchedAt || '');
            var prog = (typeof it === 'string') ? 0 : (Number(it.progress)||0);
            var existing = byId[mid];
            if (!existing || (when && when > (existing.watched_at || ''))) {
              byId[mid] = { movie_id: String(mid), watched_at: when || new Date().toISOString(), progress: prog };
            }
          });
          var arr = Object.keys(byId).map(function(k){ return byId[k]; });
          arr.sort(function(a,b){ return new Date(b.watched_at) - new Date(a.watched_at); });
          return arr;

        function fireStorageEvent(key, oldValue, newValue) {
          try {
            var ev = new StorageEvent('storage', {
              key: key, oldValue: oldValue, newValue: newValue,
              storageArea: window.localStorage, url: window.location.href

            window.dispatchEvent(ev);

            try {
              var fallback = new Event('storage');
              fallback.key = key; fallback.oldValue = oldValue; fallback.newValue = newValue;
              window.dispatchEvent(fallback);

        function safeWrite(key, value) {
          var prev = localStorage.getItem(key);
          if (prev === value) return false;
          window[REMOTE_WRITE_FLAG] = true;
          try { localStorage.setItem(key, value); }
          finally { window[REMOTE_WRITE_FLAG] = false; }
          fireStorageEvent(key, prev, value);
          return true;
        }

        function pullUserData(userId, opts) {
          if (!userId) return;
          opts = opts || {};
          gasGet('getUserData', { userId: userId }).then(function(res){
            // If id lookup fails, retry with email (fixes old sessions where id was 'admin')
            if (!res || !res.success) {
              var u = getCurrentUser();
              if (u && u.email && u.email !== String(userId)) {
                log('id lookup failed — retrying by email:', u.email);
                gasGet('getUserData', { userId: u.email }).then(function(res2){
                  if (!res2 || !res2.success) { log('email lookup also failed'); return; }
                  if (res2.profile && res2.profile.id) {
                    u.id = res2.profile.id;
                    safeWrite(SESSION_KEY, JSON.stringify(u));
                    log('corrected stored user id →', u.id);
                  }
                  doApplyUserData(res2, res2.profile ? res2.profile.id : u.email);
                });
              }
              return;
            }
            doApplyUserData(res, userId);
          });
        }

        function doApplyUserData(res, userId) {
          {
            var localBm = readJson(BOOKMARKS_KEY);
            var localHi = readJson(HISTORY_KEY);
            var localLk = readJson(LIKES_KEY);
            var mergedBm = mergeIdLists(localBm, res.bookmarks);
            var mergedHi = mergeHistory(localHi, res.watchHistory);
            var mergedLk = mergeIdLists(localLk, res.likes);

            safeWrite(BOOKMARKS_KEY, JSON.stringify(mergedBm));
            safeWrite(HISTORY_KEY,   JSON.stringify(mergedHi));
            safeWrite(LIKES_KEY,     JSON.stringify(mergedLk));

            // Merge profile fields into stored session
            var u = getCurrentUser();

              ['name','country','avatar_url','bio','phone','birthday','gender'].forEach(function(f){

            var remoteBm = (res.bookmarks || []).map(String).sort().join(',');
            var remoteHi = (res.watchHistory || []).map(function(h){return h && (h.movie_id||h.movieId||h.id);}).filter(Boolean).map(String).sort().join(',');
            var localBmKey = mergedBm.slice().sort().join(',');

        var _s = Storage.prototype.setItem;
        Storage.prototype.setItem = function(k, v) {

          }
        };

        function initialSync() {
          var u = getCurrentUser();
          if (u && u.id) {
            log('initial sync for user', u.id, '(' + (u.email || '') + ')');
            pullUserData(u.id);
            var localBm = readJson(BOOKMARKS_KEY);
            var localHi = readJson(HISTORY_KEY);
            if (localBm.length > 0) debouncedPush('bm', pushBookmarks);
            if (localHi.length > 0) debouncedPush('hi', pushHistory);
          } else {
            log('no logged-in user — skipping sync');
          }
        }

        window.mooviedSyncNow = function() {
          log('manual sync triggered');
          initialSync();
          return 'sync started — watch console for results';
        };
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', initialSync);

          initialSync();

        setInterval(function(){
          if (document.visibilityState === 'visible') initialSync();

        document.addEventListener('visibilitychange', function(){
          if (document.visibilityState === 'visible') initialSync();

            var u = getCurrentUser();
            if (u && u.id) pullUserData(u.id);
          }
        });
      } catch(e) {}
    })();

      .mvd-dl-track{margin-top:10px;height:4px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:visible;position:relative}
      .mvd-dl-fill{height:100%;width:0%;border-radius:99px;position:relative;background:linear-gradient(90deg,#15803d,#22c55e,#86efac,#22c55e,#15803d);background-size:300% 100%;transition:width .08s linear}
      .mvd-dl-fill.mvd-shine{animation:mvdShine 1.4s linear infinite}
      @keyframes mvdShine{0%{background-position:100% 0}100%{background-position:-100% 0}}
      .mvd-dl-tip{position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:#86efac;box-shadow:0 0 8px 3px rgba(134,239,172,0.7),0 0 20px 6px rgba(34,197,94,0.4);opacity:0;transition:opacity .3s}
      .mvd-dl-fill.mvd-shine .mvd-dl-tip{opacity:1}
      .mvd-dl-check{position:absolute;right:-8px;top:50%;width:16px;height:16px;border-radius:50%;background:#22c55e;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(-50%) scale(0);transition:opacity .3s,transform .4s cubic-bezier(.34,1.56,.64,1)}
      .mvd-dl-check svg{width:8px;height:8px}
      .mvd-dl-fill.mvd-done-fill .mvd-dl-check{opacity:1;transform:translateY(-50%) scale(1)}
      .mvd-dl-fill.mvd-done-fill{background:#22c55e;animation:none;box-shadow:0 0 12px rgba(34,197,94,0.5)}
      .mvd-dl-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
      .mvd-dl-pct{font-size:11px;color:rgba(255,255,255,0.28);min-width:32px;text-align:right;font-variant-numeric:tabular-nums;transition:color .4s}
      .mvd-dl-card.mvd-done .mvd-dl-pct{color:#4ade80}
      .mvd-dl-btn{font-size:11px;font-weight:700;letter-spacing:.3px;padding:8px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.8);cursor:pointer;white-space:nowrap;transition:all .25s;font-family:inherit}
      .mvd-dl-btn:hover:not(:disabled){background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)}

      .mvd-dl-scan{position:absolute;left:0;right:0;height:2px;top:-2px;background:linear-gradient(90deg,transparent,rgba(74,222,128,0.6),transparent);pointer-events:none;opacity:0}

      /* ── Static sections base ─────────────────────────────────────────────── */
      #static-sections{background:#000;width:100%}

      /* ── Studio Logo Slider ───────────────────────────────────────────────── */
      .studio-slider-wrap{position:relative;overflow:hidden;width:100%;background:#000;padding:10px 0}

      .studio-pill{display:flex;align-items:center;gap:clamp(6px,1.5vw,12px);padding:clamp(6px,1.5vw,10px) clamp(12px,2vw,18px);border-radius:999px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(14px);color:#fff;font-size:clamp(10px,1.2vw,13px);font-weight:600;transition:all .35s ease;white-space:nowrap;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:.5px}
      .studio-logo-box{width:clamp(22px,3vw,32px);height:clamp(22px,3vw,32px);border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;flex-shrink:0}

      .studio-pill.active .studio-logo-box::after{animation:studioShine 1s ease}

      .sh-btn:hover{box-shadow:0 0 22px rgba(255,255,255,0.25)}
      .sh-chips,.sh-popular{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:14px}
      .sh-chip{background:rgba(255,255,255,0.08) !important;border:1px solid rgba(255,255,255,0.1) !important;border-radius:999px !important;padding:4px 14px !important;color:rgba(255,255,255,0.8) !important;font-size:clamp(10px,1.2vw,13px);cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s;display:inline-block}
      .sh-chip:hover{background:rgba(255,255,255,0.18) !important}
      .sh-popular .sh-chip{color:rgba(255,255,255,0.65) !important;padding:3px 12px !important;font-size:clamp(9px,1vw,12px)}
      .sh-hint{color:rgba(255,255,255,0.3);font-size:clamp(9px,1vw,11px);margin-top:10px;font-family:'Inter',sans-serif}
    </style>

  </head>
  <body>

    <!-- React mounts here: Navbar + HeroBanner + MovieRows + Footer -->
    <div id="root"></div>

    <!-- ══════════════════════════════════════════════════════════════════════
         STATIC SECTIONS — always painted, zero race condition
         Sits right after #root so it naturally appears below the banner.
         React's MovieRows follow inside #root after these sections.
         ══════════════════════════════════════════════════════════════════════ -->
    <div id="static-sections">

      <!-- Studio Logo Slider -->
      <div class="studio-slider-wrap" id="studioSlider">
        <div class="studio-track" id="studioTrack">
          <div class="studio-pill"><div class="studio-logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Paramount_Pictures_logo.svg" alt="Paramount" loading="lazy"></div>PARAMOUNT</div>
          <div class="studio-pill"><div class="studio-logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg" alt="Disney" loading="lazy"></div>DISNEY</div>
          <div class="studio-pill"><div class="studio-logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/4/4d/DreamWorks_Animation_logo.svg" alt="DreamWorks" loading="lazy"></div>DREAMWORKS</div>
          <div class="studio-pill"><div class="studio-logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/d/de/HBO_logo.svg" alt="HBO" loading="lazy"></div>HBO</div>
          <div class="studio-pill"><div class="studio-logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Pixar_logo.svg" alt="Pixar" loading="lazy"></div>PIXAR</div>

          <div class="studio-pill"><div class="studio-logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Universal_Pictures_logo.svg" alt="Universal" loading="lazy"></div>UNIVERSAL</div>
          <div class="studio-pill"><div class="studio-logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/0/04/MarvelLogo.svg" alt="Marvel" loading="lazy"></div>MARVEL</div>
          <!-- duplicate for seamless loop -->
          <div class="studio-pill"><div class="studio-logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Paramount_Pictures_logo.svg" alt="" loading="lazy"></div>PARAMOUNT</div>
          <div class="studio-pill"><div class="studio-logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg" alt="" loading="lazy"></div>DISNEY</div>
          <div class="studio-pill"><div class="studio-logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/4/4d/DreamWorks_Animation_logo.svg" alt="" loading="lazy"></div>DREAMWORKS</div>
          <div class="studio-pill"><div class="studio-logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/d/de/HBO_logo.svg" alt="" loading="lazy"></div>HBO</div>
          <div class="studio-pill"><div class="studio-logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Pixar_logo.svg" alt="" loading="lazy"></div>PIXAR</div>
          <div class="studio-pill"><div class="studio-logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="" loading="lazy"></div>NETFLIX</div>
          <div class="studio-pill"><div class="studio-logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Universal_Pictures_logo.svg" alt="" loading="lazy"></div>UNIVERSAL</div>
          <div class="studio-pill"><div class="studio-logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/0/04/MarvelLogo.svg" alt="" loading="lazy"></div>MARVEL</div>

      <div class="sh-wrap">

              <p class="sh-sub">Search from thousands of movies &amp; shows</p>
              <div class="sh-row">
                <div class="sh-input-wrap">
                  <svg width="20" height="20" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                  <input class="sh-input" id="shInput" type="text" placeholder="Search movies, shows..." autocomplete="off">

                  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                  Search
                </button>

                <span class="sh-chip" data-genre="">All</span>

                <span class="sh-chip" data-search="Avengers">Avengers</span>

                <span class="sh-chip" data-search="Inception">Inception</span>

    </div><!-- /#static-sections -->

    <script>
    // ══════════════════════════════════════════════════════════════════════════
    // STATIC SECTIONS CONTROLLER
    // No DOM moving. No polling for React elements.
    // Just: show on home page, hide on all other pages.
    // ══════════════════════════════════════════════════════════════════════════
    (function(){
      var BASE = '/Admin-Log-Sync';

      // ── Show/hide based on current path ──────────────────────────────────
      function isHome() {
        var p = location.pathname.replace(/\/$/, '') || '/';
        // Home = /Admin-Log-Sync or /Admin-Log-Sync/ or just /
        return p === BASE || p === '' || p === '/';
      }

      function syncVisibility() {
        if (isHome()) {
          document.body.classList.remove('not-home');
        } else {
          document.body.classList.add('not-home');
        }
      }

      // Run immediately and on every navigation
      syncVisibility();

      // Hook React Router navigation (pushState/popstate)
      var _ps = history.pushState.bind(history);
      history.pushState = function(s, t, u) {
        var r = _ps(s, t, u);
        syncVisibility();
        return r;
      };
      window.addEventListener('popstate', syncVisibility);

      // ── Studio Slider interaction ─────────────────────────────────────────
      var pills = document.querySelectorAll('.studio-pill');
      var track = document.getElementById('studioTrack');
      var wrap  = document.getElementById('studioSlider');
      pills.forEach(function(pill){
        function on(){
          track.style.animationPlayState = 'paused';
          wrap.dataset.active = '1';
          pills.forEach(function(p){ p.classList.remove('active'); });
          pill.classList.add('active');
        }
        function off(){
          track.style.animationPlayState = 'running';
          delete wrap.dataset.active;
          pills.forEach(function(p){ p.classList.remove('active'); });
        }
        pill.addEventListener('mouseenter', on);
        pill.addEventListener('mouseleave', off);
        pill.addEventListener('click', function(){
          pill.classList.contains('active') ? off() : on();
        });
      });

      // ── Search Hero ────────────────────────────────────────────────────────
      var input = document.getElementById('shInput');
      var btn   = document.getElementById('shBtn');

      function goSearch(q) {
        if (!q || !q.trim()) return;
        window.location.href = BASE + '/movies?search=' + encodeURIComponent(q.trim());
      }
      function goGenre(g) {
        window.location.href = BASE + '/movies' + (g ? '?genre=' + encodeURIComponent(g) : '');
      }

      btn.addEventListener('click', function(){ goSearch(input.value); });
      input.addEventListener('keydown', function(e){ if(e.key==='Enter') goSearch(input.value); });

      document.querySelectorAll('.sh-chip[data-search]').forEach(function(el){
        el.addEventListener('click', function(){ goSearch(el.dataset.search); });
      });
      document.querySelectorAll('.sh-chip[data-genre]').forEach(function(el){
        el.addEventListener('click', function(){ goGenre(el.dataset.genre); });
      });

    })();
    </script>

    <script src="footer.js?v=2" defer></script>
