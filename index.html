    <!-- MOOVIED API BOOTSTRAP — must run before React bundle loads -->
    <script>
    (function () {
      var GAS = 'https://script.google.com/macros/s/AKfycbxIz_Cp3iSlHCOmGE_h2ucp2a4zGsOqZY6WaOhIJpR8nggw-bvajcFYU119aKbUQ5hO/exec';
      var API = window.location.origin + '/api';

      // Write correct values to localStorage
      localStorage.setItem('moovied_comments_api_url', API);
      localStorage.setItem('moovied_api_server_url',   API);
      localStorage.setItem('moovied_gas_url',           GAS);

      // Override localStorage.getItem globally so the compiled bundle's
      // ts() function ALWAYS gets the correct URL, even if it was cached
      // with a stale value from a previous session.
      var _origGet = Storage.prototype.getItem;
      Storage.prototype.getItem = function (key) {
        if (key === 'moovied_comments_api_url') return API;
        if (key === 'moovied_api_server_url')   return API;
        if (key === 'moovied_gas_url')          return GAS;
        return _origGet.call(this, key);
      };
    })();
    </script>
